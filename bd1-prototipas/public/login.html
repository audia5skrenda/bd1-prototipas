<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prisijungimas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="login-shell">
    <section class="panel login-panel">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Planiniai darbai</p>
          <h1>Prisijungimas</h1>
        </div>
      </div>
      <form id="loginForm" class="form-stack">
        <div>
          <label class="field-label" for="loginName">Vartotojas</label>
          <input id="loginName" name="name" type="text" autocomplete="username" required>
        </div>
        <div>
          <label class="field-label" for="loginPassword">Slaptažodis</label>
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
        </div>
        <p class="form-message" id="loginMessage" role="status"></p>
        <button class="button button-primary full-width" type="submit">Prisijungti</button>
      </form>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
