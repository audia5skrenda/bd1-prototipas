<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darbai</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Sąrašas</p>
        <h1>Darbai</h1>
      </div>
      <nav class="topbar-actions" aria-label="Puslapiai">
        <a class="button button-secondary" href="index.html">Pagrindinis</a>
        <a class="button button-secondary" href="companies.html">Įmonės</a>
        <a class="button button-secondary" href="emails.html">Emailai</a>
        <a class="button button-secondary" href="settings.html" data-admin-only>Nustatymai</a>
        <button class="button button-secondary" onclick="loadAllWorks()" type="button">Atnaujinti</button>
      </nav>
    </header>

    <section class="filter-bar" aria-label="Darbų filtrai">
      <input id="allWorksSearch" type="search" placeholder="Ieškoti pagal įmonę, aprašymą, datą">
      <select id="allWorksSort">
        <option value="newest">Naujausi viršuje</option>
        <option value="oldest">Seniausi viršuje</option>
        <option value="company">Pagal įmonę</option>
        <option value="status">Pagal būseną</option>
      </select>
      <select id="allWorksStatus">
        <option value="all">Visi statusai</option>
        <option value="sent">Išsiųsta</option>
        <option value="not-sent">Neišsiųsta</option>
      </select>
    </section>

    <section class="pagination-bar" aria-label="Darbų puslapiavimas">
      <span id="worksPageSummary">0 darbų</span>
      <div class="pagination-actions">
        <button class="button button-secondary" id="previousWorksPage" type="button">Atgal</button>
        <span id="worksPageIndicator">1 / 1</span>
        <button class="button button-secondary" id="nextWorksPage" type="button">Toliau</button>
      </div>
    </section>

    <section class="panel">
      <ul class="work-list" id="allWorksList"></ul>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="works.js"></script>
</body>
</html>
